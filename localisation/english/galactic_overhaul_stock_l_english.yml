l_english:
 go_shares:0 "Galactic Shares"
 policy_go_investment:0 "Investment Portfolio"
 policy_go_investment_desc:0 "How your treasury invests surplus trade in the galactic stock market. Share value tracks the galactic market index - it rises and falls with the economy - and holdings pay monthly dividends."
 go_investment:0 "Investment Portfolio"
 go_investment_desc:0 "How your treasury invests surplus trade in the galactic stock market."
 go_inv_off:0 "No Market Investment"
 go_inv_off_desc:0 "Your treasury stays out of the stock market. No shares are bought and no dividends are earned."
 go_inv_payout:0 "Invest - Pay Dividends"
 go_inv_payout_desc:0 "Each month a slice of surplus trade is invested in Galactic Shares (value tracks the galactic market index). Dividends are paid out to you as trade."
 go_inv_drip:0 "Invest - Reinvest Dividends (DRIP)"
 go_inv_drip_desc:0 "Each month a slice of surplus trade is invested in Galactic Shares. Dividends are automatically reinvested into more shares, compounding your holdings."
 go_investment_active_name:0 "Investing"
 go_investment_drip_name:0 "Dividend Reinvestment"
 decision_go_liquidate_stocks:0 "Liquidate Stock Holdings"
 decision_go_liquidate_stocks_desc:0 "Sell all Galactic Shares at the current market price, converting them back to trade. Take profits when the market is high - or raise cash in a pinch."
