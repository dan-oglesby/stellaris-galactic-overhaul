l_english:
 civic_go_banking_charter:0 "Galactic Banking Charter"
 civic_go_banking_charter_desc:0 "Your corporate dynasty holds the founding charter of the Galactic Bank. The moment your empire takes the galactic stage, the Bank opens its doors galaxy-wide - and every empire, by some quiet arrangement of yours, finds it already has access."
 civic_go_banking_charter_effects:0 "§YInstantly founds the Galactic Bank for the entire galaxy§! (no Community vote needed).\nAll empires gain access to the Galactic Banking policy.\n+10,000 Trade storage."
 civic_go_market_authority:0 "Galactic Exchange Authority"
 civic_go_market_authority_desc:0 "Your corporation IS the marketplace. From the first day, the Galactic Market is open for business across the stars - every empire mysteriously finds the exchange already trading their goods."
 civic_go_market_authority_effects:0 "§YInstantly founds the Galactic Market for the entire galaxy§! (no Community vote needed).\nAll empires gain galactic market access.\n+5,000 Trade storage."
 galactic_overhaul_civic.2.name:0 "The Galactic Bank Opens"
 galactic_overhaul_civic.2.desc:0 "Without fanfare or ceremony, a galaxy-spanning financial institution has simply... appeared. Branch offices materialize in every capital, ledgers already balanced, accounts already open in our name. No one recalls authorizing it - yet here it is, the Galactic Bank, and we are told we have always been members. The arrangement bears the unmistakable fingerprints of a certain corporate power."
 galactic_overhaul_civic.2.a:0 "How... convenient."
 galactic_overhaul_civic.3.name:0 "The Galactic Market Opens"
 galactic_overhaul_civic.3.desc:0 "Overnight, the great Galactic Market has thrown open its doors. Our traders report standing accounts they never opened, commodities already listed, prices already quoted. The exchange hums as though it has run for centuries. Somewhere, a corporate executive is smiling."
 galactic_overhaul_civic.3.a:0 "Let us trade, then."
