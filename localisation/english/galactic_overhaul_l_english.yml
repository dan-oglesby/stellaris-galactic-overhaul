l_english:
 policy_galactic_overhaul_banking:0 "Galactic Banking"
 policy_galactic_overhaul_banking_desc:0 "Charter a central reserve bank for your empire. An active charter raises your Trade storage cap and pays monthly interest on the trade you hold in reserve. The interest rate climbs when the galactic market price swings sharply from its recent average - in either direction - and tapers as your reserves grow. Requires the Galactic Bank to have been chartered by the Galactic Community."
 galactic_overhaul_banking:0 "Galactic Banking"
 galactic_overhaul_banking_desc:0 "Charter a central reserve bank for your empire. Raises Trade storage and pays interest that scales with market volatility and tapers as reserves grow."
 go_off:0 "No Central Bank"
 go_off_desc:0 "No banking charter is in effect. Trade storage follows normal rules."
 go_conservative:0 "Conservative Reserve"
 go_conservative_desc:0 "A cautious charter.\n+25,000 Trade storage\nBase +0.25% monthly interest, rising with sharp galactic market swings (up to double) and tapering as reserves grow."
 go_standard:0 "Standard Reserve"
 go_standard_desc:0 "A balanced charter.\n+50,000 Trade storage\nBase +0.50% monthly interest, rising with sharp galactic market swings (up to double) and tapering as reserves grow.
§RRisk: ~8%/month chance of a market loss.§!"
 go_aggressive:0 "Aggressive Reserve"
 go_aggressive_desc:0 "An expansive charter.\n+100,000 Trade storage\nBase +1.00% monthly interest, rising with sharp galactic market swings (up to double) and tapering as reserves grow.
§RRisk: ~15%/month chance of a larger market loss.§!"
 galactic_overhaul_active_name:0 "Galactic Banking"
 galactic_overhaul_tier_conservative_name:0 "Conservative Reserve"
 galactic_overhaul_tier_standard_name:0 "Standard Reserve"
 galactic_overhaul_tier_aggressive_name:0 "Aggressive Reserve"
 resolution_category_galactic_overhaul:0 "Galactic Bank"
 resolution_galactic_overhaul_charter:0 "Charter the Galactic Bank"
 resolution_galactic_overhaul_charter_desc:0 "Found a galaxy-spanning financial institution. Once chartered, Galactic Community members may adopt the Galactic Banking policy, and the member empire with the largest trade reserves is named its host, earning additional interest."
 resolution_galactic_overhaul_charter_effect:0 "Establishes the Galactic Bank.\nUnlocks the Galactic Banking policy for all Galactic Community members.\nNames the member with the largest trade reserves as host (+0.50% interest). The host is re-evaluated yearly."
 decision_galactic_overhaul_debug:0 "Toggle Galactic Overhaul Debug Log"
 decision_galactic_overhaul_debug_desc:0 "Toggles monthly debug lines (written to logs/game.log) for the Galactic Overhaul systems: interest, automated trades, and taxation. Use it to tune the dynamic models."
 decision_galactic_overhaul_debug_on:0 "Galactic Overhaul debug logging is now ENABLED (writing to game.log)."
 decision_galactic_overhaul_debug_off:0 "Galactic Overhaul debug logging is now DISABLED."
 policy_treasury_automation:0 "Treasury Automation"
 policy_treasury_automation_desc:0 "Sets how actively your treasury trades commodities on the market, spending and earning trade."
 treasury_automation:0 "Treasury Automation"
 treasury_automation_desc:0 "Sets how actively your treasury trades commodities on the market, spending and earning trade."
 ta_off:0 "Manual Oversight"
 ta_off_desc:0 "Your ministers trade only on your direct order. No automated buying or selling."
 ta_on:0 "Algorithmic Commodities Desk"
 ta_on_desc:0 "Adopt advanced commodities strategies. Autonomous algorithms watch your stockpiles and the market: when a commodity caps out while still in surplus they sell the overflow for trade, and when one runs dry they spend trade to buy it back. Covers energy, minerals, food, alloys, and consumer goods at the live market price, with a simulated fee and a price-impact penalty. Never spends trade below a safety reserve."
 treasury_automation_active_name:0 "Automated Desk"
 policy_taxation_doctrine:0 "Taxation Doctrine"
 policy_taxation_doctrine_desc:0 "How aggressively the state taxes private commerce. An automated revenue service moves the tax rate on your empire's trade income toward the chosen stance each month, collecting the proceeds as trade."
 taxation_doctrine:0 "Taxation Doctrine"
 taxation_doctrine_desc:0 "How aggressively the state taxes private commerce. An automated revenue service moves the tax rate on your empire's trade income toward the chosen stance each month, collecting the proceeds as trade."
 go_tax_off:0 "Untaxed Markets"
 go_tax_off_desc:0 "Private commerce goes untaxed. No revenue is collected from trade."
 go_tax_low:0 "Laissez-Faire"
 go_tax_low_desc:0 "A light hand. The revenue service drifts the tax rate down toward its lower bound - modest state income, but a contented, thriving private sector.\n+5% Pop Happiness"
 go_tax_balanced:0 "Balanced Levy"
 go_tax_balanced_desc:0 "A measured rate. The revenue service holds taxes near the middle of the band - steady income without unduly provoking the populace."
 go_tax_high:0 "Heavy Taxation"
 go_tax_high_desc:0 "Squeeze the markets. The revenue service drives the tax rate up toward its upper bound - maximum income, but a resentful, restless population.\n-5% Pop Happiness\n-5 Stability"
 go_tax_active_name:0 "Taxation Active"
 go_tax_mode_low_name:0 "Laissez-Faire"
 go_tax_mode_balanced_name:0 "Balanced Levy"
 go_tax_mode_high_name:0 "Heavy Taxation"
 ta_opportunistic:0 "Opportunistic Trading Desk"
 ta_opportunistic_desc:0 "The most proactive desk. It does everything the Automated desk does - covering shortages and offloading gluts - and on top of that actively works the market: buying a commodity when its price dips below its recent average and selling when it spikes above, pocketing the spread. A monthly management fee reflects the cost of running an active trading operation."
 go_trade_opportunistic_name:0 "Opportunistic Desk"
